name: Turuhashi AI Strategy Report

on:
  schedule:
    - cron: '0 20 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 2026年3月時点で確実に共存できるバージョンを指定
          pip install pandas>=2.2.0
          pip install pandas-ta>=0.4.0b0
          pip install tradingview-screener mplfinance google-genai python-dotenv websocket-client
          # tvdatafeedはGitから直接が最も確実
          pip install git+https://github.com/StreamAlpha/tvdatafeed.git
      - name: Run AI Strategy
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TV_SESSION_ID: ${{ secrets.TV_SESSION_ID }}
        run: python main.py
