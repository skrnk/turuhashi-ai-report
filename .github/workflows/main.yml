name: Turuhashi AI Strategy Report

on:
  schedule:
    - cron: '0 20 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12' # 最新のpandas-taには3.12が必須
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 個別にインストールすることで、エラーの切り分けを確実にする
          pip install pandas==2.2.2
          pip install pandas-ta==0.3.14b0
          pip install tradingview-screener mplfinance google-genai python-dotenv websocket-client
          # tvdatafeedを公式GitHubから直接（認証なし・確実に）インストール
          pip install git+https://github.com/StreamAlpha/tvdatafeed.git
      - name: Run AI Strategy
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TV_SESSION_ID: ${{ secrets.TV_SESSION_ID }}
        run: python main.py
