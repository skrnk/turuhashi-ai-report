name: Turuhashi AI Strategy Report

on:
  schedule:
    - cron: '0 20 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # 安定性のために3.11へ戻します
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 1. 基礎ライブラリ
          pip install pandas==2.2.3
          pip install --pre pandas-ta
          pip install tradingview-screener mplfinance google-genai python-dotenv websocket-client requests
          # 2. tvdatafeedをZIP経由で強制インストール（Git認証エラーを100%回避）
          curl -L https://github.com/StreamAlpha/tvdatafeed/archive/refs/heads/main.zip -o tvdatafeed.zip
          pip install tvdatafeed.zip
      - name: Run AI Strategy
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TV_SESSION_ID: ${{ secrets.TV_SESSION_ID }}
        run: python main.py
